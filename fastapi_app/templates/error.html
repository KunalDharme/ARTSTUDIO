{% extends "base.html" %}
{% block content %}
<section class="container" style="text-align:center;padding:5rem 1rem">
  <div style="font-size:6rem;margin-bottom:1rem">⚠️</div>
  <h1 style="font-size:3rem;font-weight:800;margin-bottom:0.5rem">{{ status_code }}</h1>
  <p style="font-size:1.2rem;opacity:0.7;margin-bottom:2rem">{{ detail }}</p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <a class="button" href="javascript:history.back()">Go Back</a>
    <a class="button" href="/">Go Home</a>
  </div>
</section>
{% endblock %}
