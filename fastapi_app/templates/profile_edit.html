{% extends "base.html" %}
{% block content %}
<section class="container form-section">
  <div class="section-intro">
    <h2>Edit profile</h2>
    <p>Update your bio or upload a custom avatar.</p>
  </div>
  <form action="/profile/{{ user.username }}/edit" method="post" enctype="multipart/form-data" class="upload-form">
    <label>
      Bio
      <textarea name="bio" rows="4" placeholder="Your bio">{{ user.bio or '' }}</textarea>
    </label>

    <label>Avatar image</label>
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:8px">
      <div id="avatarPreviewWrap" style="width:80px;height:80px;border-radius:50%;overflow:hidden;background:var(--surface-2);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        {% if user.avatar %}
          <img id="avatarPreviewImg" src="/uploads/{{ user.avatar }}" style="width:100%;height:100%;object-fit:cover" />
        {% else %}
          <span id="avatarInitial" style="font-size:2rem">{{ user.username[0].upper() }}</span>
          <img id="avatarPreviewImg" style="width:100%;height:100%;object-fit:cover;display:none" />
        {% endif %}
      </div>
      <div>
        <label class="button button-secondary" style="cursor:pointer;display:inline-block">
          Choose avatar
          <input type="file" name="avatar" id="avatarInput" accept="image/*" style="display:none" />
        </label>
        <p id="avatarFileName" style="font-size:0.8rem;opacity:0.6;margin-top:4px">No file chosen</p>
      </div>
    </div>

    <button type="submit" class="button">Save profile</button>
  </form>
</section>

<script>
document.getElementById('avatarInput').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  document.getElementById('avatarFileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('avatarPreviewImg');
    const initial = document.getElementById('avatarInitial');
    img.src = e.target.result;
    img.style.display = 'block';
    if (initial) initial.style.display = 'none';
  };
  reader.readAsDataURL(file);
});
</script>
{% endblock %}
